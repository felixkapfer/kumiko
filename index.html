<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lokale Lern-App für die Advanced Database Systems Prüfung"
    />
    <title>Kumiko · Study Platform</title>
    <link rel="stylesheet" href="styles.css?v=20260625-2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div>
            <strong>KUMIKO</strong>
            <span>Study Platform</span>
          </div>
        </div>

        <div class="study-context">
          <label for="course-select">Kurs</label>
          <select id="course-select" aria-label="Kurs auswählen"></select>
          <label for="exam-select">Klausur</label>
          <select id="exam-select" aria-label="Klausur auswählen"></select>
        </div>

        <nav class="main-nav" aria-label="Hauptnavigation">
          <button class="nav-item active" data-view="dashboard" data-i18n-label="nav.dashboard">
            <span>01</span> Überblick
          </button>
          <button class="nav-item" data-view="learn" data-i18n-label="nav.learn">
            <span>02</span> Lernstoff
          </button>
          <button class="nav-item" data-view="coding" data-i18n-label="nav.coding">
            <span>03</span> Cypher
          </button>
          <button class="nav-item" data-view="practice" data-i18n-label="nav.practice">
            <span>04</span> Fragen
          </button>
          <button class="nav-item" data-view="exam" data-i18n-label="nav.exam">
            <span>05</span> Prüfung
          </button>
          <button class="nav-item" data-view="history" data-i18n-label="nav.history">
            <span>06</span> Prüfungsverlauf
          </button>
          <button class="nav-item" data-view="glossary" data-i18n-label="nav.glossary">
            <span>07</span> Glossar
          </button>
          <button class="nav-item" data-view="slides" data-i18n-label="nav.slides">
            <span>08</span> Slides
          </button>
          <button class="nav-item" data-view="library" data-i18n-label="nav.library">
            <span>09</span> Fragenpool
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="sync-dot"></div>
          <div>
            <strong id="sidebar-question-count">– Fragen</strong>
            <span data-i18n="common.localOffline">lokal & offline</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Kumiko · Master Study Platform</p>
            <h1 id="view-title">Überblick</h1>
          </div>
          <div class="topbar-actions">
            <div class="language-toggle" role="group" aria-label="Language">
              <button class="lang-button active" data-language="de">DE</button>
              <button class="lang-button" data-language="en">EN</button>
            </div>
            <button id="mobile-menu" class="icon-button" aria-label="Menü">☰</button>
            <button id="reset-progress" class="ghost-button" data-i18n="common.resetProgress">Fortschritt zurücksetzen</button>
          </div>
        </header>

        <section id="app-content" class="content" aria-live="polite">
          <div class="loading-card">
            <div class="loader"></div>
            <p>Lernmaterial wird geladen …</p>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="app.js?v=20260625-2"></script>
  </body>
</html>
