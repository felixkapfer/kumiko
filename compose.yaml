name: kumiko-study

services:
  kumiko:
    build:
      context: .
    container_name: kumiko
    ports:
      - "8000:8000"
    environment:
      KUMIKO_HOST: 0.0.0.0
      KUMIKO_PORT: 8000
      KUMIKO_DATA_DIR: /data
    volumes:
      - kumiko-data:/data
    restart: unless-stopped

volumes:
  kumiko-data:
